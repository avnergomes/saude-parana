    <!-- Datageo Auth Referer Gate -->
    <script>
      (function () {
        try {
          var ALLOWED = ['datageoparana.github.io'];
          var ROOT = 'https://datageoparana.github.io/';
          var KEY = 'dg_dashboard_pass';
          if (sessionStorage.getItem(KEY) === '1') return;
          var refHost = '';
          try { refHost = new URL(document.referrer || '').host; } catch (e) {}
          if (refHost && (refHost === location.host || ALLOWED.indexOf(refHost) !== -1)) {
            sessionStorage.setItem(KEY, '1');
            return;
          }
          location.replace(ROOT + '?from=' + encodeURIComponent(location.host + location.pathname));
        } catch (e) {}
      })();
    </script>

    <!-- Analytics Tracking Script - Dados anonimizados (Art. 12 LGPD) -->
    <script>
    (function() {
      var TRACKING_URL = '%VITE_TRACKING_URL%';
      if (!TRACKING_URL || TRACKING_URL.indexOf('VITE_TRACKING_URL') !== -1) {
        console.warn('[Tracking] URL not configured - tracking disabled');
        return;
      }

      function getDeviceType() {
        var ua = navigator.userAgent;
        if (/tablet|ipad|playbook|silk/i.test(ua)) return 'Tablet';
        if (/Mobile|Android|iPhone|iPod|webOS|BlackBerry|Opera Mini|IEMobile/i.test(ua)) return 'Mobile';
        return 'Desktop';
      }

      function getConnectionType() {
        if (navigator.connection) {
          return navigator.connection.effectiveType || 'unknown';
        }
        return 'unknown';
      }

      function getUTMParams() {
        var params = new URLSearchParams(window.location.search);
        return {
          utmSource: params.get('utm_source') || '',
          utmMedium: params.get('utm_medium') || '',
          utmCampaign: params.get('utm_campaign') || '',
          utmTerm: params.get('utm_term') || '',
          utmContent: params.get('utm_content') || ''
        };
      }

      function initTracking() {
        try {
          var loadTime = 0;
          var navEntry = window.performance && window.performance.getEntriesByType ? window.performance.getEntriesByType('navigation')[0] : null;
          if (navEntry) {
            loadTime = Math.round(navEntry.loadEventEnd);
          }

          var utmParams = getUTMParams();

          // Campos anonimizados - sem IP, cookies ou fingerprint (Art. 12 LGPD)
          var data = {
            origin: window.location.origin,
            timestamp: new Date().toISOString(),
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            timezoneOffset: new Date().getTimezoneOffset(),
            page: window.location.href,
            pathname: window.location.pathname,
            referrer: document.referrer || '',
            pageTitle: document.title,
            language: navigator.language,
            deviceType: getDeviceType(),
            screenOrientation: screen.orientation ? screen.orientation.type : 'unknown',
            connectionType: getConnectionType(),
            loadTime: loadTime > 0 ? loadTime : '',
            utmSource: utmParams.utmSource,
            utmMedium: utmParams.utmMedium,
            utmCampaign: utmParams.utmCampaign,
            utmTerm: utmParams.utmTerm,
            utmContent: utmParams.utmContent,
            prefersColorScheme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          };

          fetch(TRACKING_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify(data)
          }).then(function() {
            console.log('[Tracking] Data sent (anonymous)');
          }).catch(function(err) {
            console.warn('[Tracking] Error:', err);
          });
        } catch (e) {
          console.warn('[Tracking] Exception:', e);
        }
      }

      // Tracking dispara sempre - dados anonimizados nao exigem consentimento
      if (document.readyState === 'complete') {
        setTimeout(initTracking, 100);
      } else {
        window.addEventListener('load', function() { setTimeout(initTracking, 100); });
      }
    })();
    </script>

      </p>
      <button onclick="document.getElementById('lgpd-banner').style.display='none';localStorage.setItem('lgpd-accepted','true')" style="background:#0284c7;color:white;border:none;padding:0.5rem 1.5rem;border-radius:0.375rem;cursor:pointer;white-space:nowrap;font-weight:600;">
